name: Update toolbox

on:
  workflow_dispatch:
  schedule:
    - cron: 0 8 * * 1

defaults:
  run:
    shell: bash

permissions: {}

jobs:
  update-toolbox:
    name: Update toolbox
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: ./.github/actions/setup-go

      - name: Run update-toolbox
        id: update-toolbox
        run: |
          {
            echo "summary<<EOF"
            go run ./hack/go/cmd/update-toolbox
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Set up Node.js
        if: steps.update-toolbox.outputs.summary != ''
        uses: ./.github/actions/setup-node

      - name: Build
        if: steps.update-toolbox.outputs.summary != ''
        run: pnpm run build
        working-directory: hack/js

      - name: Generate bot token
        if: steps.update-toolbox.outputs.summary != ''
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: generate-token
        with:
          app-id: ${{ secrets.CERBOS_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CERBOS_BOT_PRIVATE_KEY }}

      - name: Create pull request
        if: steps.update-toolbox.outputs.summary != ''
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate-token.outputs.token }}
          branch: update-toolbox
          delete-branch: true
          signoff: true
          sign-commits: true
          author: ${{ vars.CERBOS_BOT_AUTHOR }}
          committer: ${{ vars.CERBOS_BOT_AUTHOR }}
          commit-message: |-
            Update toolbox
          title: |-
            Update toolbox
          body: ${{ steps.update-toolbox.outputs.summary }}
          add-paths: |-
            install-tools/action.mjs
            toolbox.json
