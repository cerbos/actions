name: Update toolbox

on:
  workflow_dispatch:
  schedule:
    - cron: 0 8 * * 1

defaults:
  run:
    shell: bash

permissions: {}

jobs:
  update-toolbox:
    name: Update toolbox
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: hack/go/go.mod
          cache-dependency-path: hack/go/go.sum

      - name: Run update-toolbox
        id: update-toolbox
        run: |
          {
            echo "summary<<EOF"
            go -C hack/go run ./cmd/update-toolbox
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Set up pnpm
        if: steps.update-toolbox.outputs.summary != ''
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          package_json_file: hack/js/package.json

      - name: Set up Node.js
        if: steps.update-toolbox.outputs.summary != ''
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: pnpm
          cache-dependency-path: hack/js/pnpm-lock.yaml
          node-version-file: hack/js/.node-version

      - name: Install dependencies
        if: steps.update-toolbox.outputs.summary != ''
        run: pnpm install --frozen-lockfile
        working-directory: hack/js

      - name: Build
        if: steps.update-toolbox.outputs.summary != ''
        run: pnpm run build
        working-directory: hack/js

      - name: Generate bot token
        if: steps.update-toolbox.outputs.summary != ''
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: generate-token
        with:
          app-id: ${{ secrets.CERBOS_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CERBOS_BOT_PRIVATE_KEY }}

      - name: Create pull request
        if: steps.update-toolbox.outputs.summary != ''
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ steps.generate-token.outputs.token }}
          branch: update-toolbox
          delete-branch: true
          signoff: true
          sign-commits: true
          author: ${{ vars.CERBOS_BOT_AUTHOR }}
          committer: ${{ vars.CERBOS_BOT_AUTHOR }}
          commit-message: |-
            Update toolbox
          title: |-
            Update toolbox
          body: ${{ steps.update-toolbox.outputs.summary }}
          add-paths: |-
            install-tools/action.mjs
            toolbox.json
