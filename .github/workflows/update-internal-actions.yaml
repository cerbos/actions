name: Update internal actions

on:
  push:
    branches:
      - main

defaults:
  run:
    shell: bash

permissions: {}

jobs:
  update-internal-actions:
    name: Update internal actions
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: ./.github/actions/setup-go

      - name: Run update-internal-actions
        run: go -C hack/go run ./cmd/update-internal-actions
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Generate bot token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: generate-token
        with:
          app-id: ${{ secrets.CERBOS_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CERBOS_BOT_PRIVATE_KEY }}

      - name: Create pull request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ steps.generate-token.outputs.token }}
          branch: update-internal-actions
          delete-branch: true
          signoff: true
          sign-commits: true
          author: ${{ vars.CERBOS_BOT_AUTHOR }}
          committer: ${{ vars.CERBOS_BOT_AUTHOR }}
          commit-message: |-
            Update internal actions
          title: |-
            Update internal actions
          body: |-
            This PR updates references between actions in this repository.
          add-paths: |-
            */action.yaml
