name: Update internal actions

on:
  push:
    branches:
      - main

defaults:
  run:
    shell: bash

permissions: {}

jobs:
  update-internal-actions:
    name: Update internal actions
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: ./.github/actions/setup-go

      - name: Run update-internal-actions
        run: go run ./hack/go/cmd/update-internal-actions
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Create pull request
        uses: ./create-pull-request
        with:
          client-id: ${{ secrets.CERBOS_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CERBOS_BOT_PRIVATE_KEY }}
          author: ${{ vars.CERBOS_BOT_AUTHOR }}
          branch: update-internal-actions
          title: Update internal actions
          body: This PR updates references between actions in this repository.
          add-paths: |-
            */action.yaml

      - name: Notify Slack on failure
        if: failure()
        uses: ./notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_CI_NOTIFICATIONS_WEBHOOK_URL }}
