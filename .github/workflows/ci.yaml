name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

defaults:
  run:
    shell: bash

permissions: {}

jobs:
  action-install-tools:
    name: Test install-tools action
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: List tools
        id: toolbox
        run: jq --raw-output '["tools<<EOF"] + keys + ["EOF"] | .[]' < toolbox.json >> "${GITHUB_OUTPUT}"

      - name: Run
        uses: ./install-tools
        with:
          tools: ${{ steps.toolbox.outputs.tools }}

  go-lint:
    name: Lint Go code
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Lint
        uses: ./golangci-lint
        with:
          working-directory: hack/go

  go-test:
    name: Test Go code
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: hack/go/go.mod
          cache-dependency-path: hack/go/go.sum

      - name: Tidy
        run: go -C hack/go mod tidy

      - name: Run update-internal-actions
        if: github.event_name != 'push'
        run: go -C hack/go run ./cmd/update-internal-actions
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run update-toolbox
        run: go -C hack/go run ./cmd/update-toolbox
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run wrap-actions
        run: go -C hack/go run ./cmd/wrap-actions
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Check for uncommitted changes
        uses: ./check-repo-status

  js:
    name: Lint and test JavaScript code
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          package_json_file: hack/js/package.json

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: pnpm
          cache-dependency-path: hack/js/pnpm-lock.yaml
          node-version-file: hack/js/.node-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: hack/js

      - name: Lint
        run: pnpm run lint
        working-directory: hack/js

      - name: Build
        run: pnpm run build
        working-directory: hack/js

      - name: Check for uncommitted changes
        uses: ./check-repo-status

  zizmor:
    name: Audit GitHub Actions security
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
