name: Set up Node.js
description: Install Node.js and dependencies

runs:
  using: composite
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
      with:
        package_json_file: hack/js/package.json

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        cache: pnpm
        cache-dependency-path: hack/js/pnpm-lock.yaml
        node-version-file: hack/js/.node-version

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
      working-directory: hack/js
