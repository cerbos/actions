name: Set up Node.js
description: Install Node.js and dependencies

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: hack/js/.node-version

    - name: Set up pnpm
      uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
      with:
        cache: true
        cache_dependency_path: hack/js/pnpm-lock.yaml
        package_json_file: hack/js/package.json
        run_install: |
          cwd: hack/js
