name: Set up Node.js
description: Install Node.js and dependencies

runs:
  using: composite
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      with:
        package_json_file: hack/js/package.json

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        cache: pnpm
        cache-dependency-path: hack/js/pnpm-lock.yaml
        node-version-file: hack/js/.node-version

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
      working-directory: hack/js
