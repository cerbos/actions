name: Set up Go
description: Install Go and dependencies

inputs:
  go-version:
    description: Version of Go to install
    required: false

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        go-version: ${{ inputs.go-version }}
        go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}
        cache-dependency-path: go.sum
        check-latest: ${{ inputs.go-version != '' }}
