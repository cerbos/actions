name: Set up Go
description: Install Go and dependencies

inputs:
  go-version:
    description: Version of Go to install
    required: false

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ inputs.go-version }}
        go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}
        cache-dependency-path: go.sum
        check-latest: ${{ inputs.go-version != '' }}
