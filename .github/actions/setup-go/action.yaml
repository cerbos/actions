name: Set up Go
description: Install Go and dependencies

inputs:
  go-version:
    description: Version of Go to install
    required: false

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: ${{ inputs.go-version }}
        go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}
        cache-dependency-path: go.sum
        check-latest: ${{ inputs.go-version != '' }}
