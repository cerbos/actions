name: Lint actions
description: Lint GitHub Actions workflows and actions

inputs:
  advanced-security:
    description: Enable GitHub Advanced Security for zizmor's results?
    required: false
    default: "true"

runs:
  using: composite

  steps:
    - name: Install tools
      uses: cerbos/actions/install-tools@387215b7a12a90257296b8a2a85722ad93e1fdf5
      with:
        tools: |-
          actionlint
          shellcheck

    - name: Run actionlint
      run: actionlint
      shell: bash

    - name: Run zizmor
      uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
      with:
        advanced-security: ${{ inputs.advanced-security }}
        annotations: ${{ inputs.advanced-security != 'true' }}
