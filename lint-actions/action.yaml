name: Lint actions
description: Lint GitHub Actions workflows and actions

inputs:
  advanced-security:
    description: Enable GitHub Advanced Security for zizmor's results?
    required: false
    default: "true"

runs:
  using: composite

  steps:
    - name: Install tools
      uses: cerbos/actions/install-tools@2b6b9d56d78e8ccb1c16fc082cbb77f77d5c76fa
      with:
        tools: |-
          actionlint
          shellcheck

    - name: Run actionlint
      run: actionlint
      shell: bash

    - name: Run zizmor
      uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
      with:
        advanced-security: ${{ inputs.advanced-security }}
        annotations: ${{ inputs.advanced-security != 'true' }}
